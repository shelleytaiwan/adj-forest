<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelley老師製作的AI華語自學工具</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-decoration: none; color: #333; transition: transform 0.2s, box-shadow 0.2s; display: block; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 12px rgba(0,0,0,0.15); }
        
        /* 圖片容器與防出錯樣式 */
        .img-container {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            background-color: #f1f5f9;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* 自動生成的精美圖示樣式 */
        .fallback-avatar {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            user-select: none;
        }
        
        h1 { color: #2c3e50; }
    </style>
    <script>
        // 當圖片載入失敗時，自動替換為主題漸層色與表情符號的精美圖示
        function handleImgError(img, emoji, gradientType) {
            const container = img.parentElement;
            let gradient = 'linear-gradient(135deg, #f1f5f9, #cbd5e1)'; // 預設灰色
            
            if (gradientType === 'blue') gradient = 'linear-gradient(135deg, #e0f2fe, #bae6fd)';
            else if (gradientType === 'purple') gradient = 'linear-gradient(135deg, #f3e8ff, #e9d5ff)';
            else if (gradientType === 'pink') gradient = 'linear-gradient(135deg, #fce7f3, #fbcfe8)';
            else if (gradientType === 'green') gradient = 'linear-gradient(135deg, #dcfce7, #bbf7d0)';
            else if (gradientType === 'yellow') gradient = 'linear-gradient(135deg, #fef9c3, #fef08a)';
            else if (gradientType === 'orange') gradient = 'linear-gradient(135deg, #ffedd5, #fed7aa)';
            else if (gradientType === 'red') gradient = 'linear-gradient(135deg, #fee2e2, #fecaca)';
            else if (gradientType === 'teal') gradient = 'linear-gradient(135deg, #ccfbf1, #99f6e4)';

            container.innerHTML = `
                <div class="fallback-avatar" style="background: ${gradient}">
                    <span>${emoji}</span>
                </div>
            `;
        }
    </script>
</head>
<body>

    <h1>Shelley老師製作的AI中文學習工具</h1>
    <p>點擊下方圖片即可開始練習：</p>

    <div class="container">
        <!-- 1. 派遣前總複習 -->
        <a href="https://shelleytaiwan.github.io/chinese-review/" class="card">
            <div class="img-container">
                <img src="https://i.postimg.cc/PP4t2P1r/1.png" alt="派遣前總複習" onerror="handleImgError(this, '🎓', 'blue')">
            </div>
            <h3>派遣前總複習</h3>
        </a>
        
        <!-- 2. 叫人練習 -->
        <a href="https://shelleytaiwan.github.io/greeting/" class="card">
            <div class="img-container">
                <img src="https://i.postimg.cc/p9KLHkgV/2.png" alt="叫人練習" onerror="handleImgError(this, '🗣️', 'purple')">
            </div>
            <h3>叫人練習</h3>
        </a>
        
        <!-- 3. 量詞比賽 -->
        <a href="https://wordwall.net/tc/resource/1495817/%E9%87%8F%E8%AF%8D" class="card">

            </div>
            <h3>量詞比賽</h3>
        </a>
        
        <!-- 4. 量詞總複習 -->
        <a href="https://shelleytaiwan.github.io/measure-words-/" class="card">
            <div class="img-container">
                <img src="https://i.ibb.co/j960n7Pm/measure.jpg" alt="量詞總複習" onerror="handleImgError(this, '📝', 'teal')">
            </div>
            <h3>量詞總複習</h3>
        </a>
        
        <!-- 5. 聲調練習 -->
        <a href="https://shelleytaiwan.github.io/tone-trainer/" class="card">

        <!-- 6. 數字聽力 -->

        <!-- 16. 拉霸機(簡) -->
        <a href="https://shelleytaiwan.github.io/slot-machine-ch/" class="card">

        <!-- 17. 打字練習(繁) -->

                <img src="https://i.postimg.cc/vDcCxDZX/14.png" alt="打字練習(繁)" onerror="handleImgError(this, '⌨️', 'blue')">

        <!-- 18. 打字練習(簡) -->

        <!-- 19. 對話篇章配音 -->

        <!-- 20. 圖文辨識中翻日 -->

                <img src="https://i.postimg.cc/JDLgZd9q/image.jpg" alt="圖文辨識中翻日" onerror="handleImgError(this, '🔍', 'teal')">
            </div>
            <h3>圖文辨識中翻日</h3>
        </a>
        
        <!-- 21. 其他推薦 -->
        <a href="https://shelleytaiwan.github.io/other-tools/" class="card">

</html>
